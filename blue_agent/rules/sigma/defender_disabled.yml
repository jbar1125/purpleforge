title: Defender Tampering / Disablement
id: b1e7c3a0-0008-4a10-9e21-000000001562
status: stable
description: >
  Detects attempts to disable Microsoft Defender: a DisableAntiSpyware /
  DisableRealtimeMonitoring registry set (13), a Set-MpPreference -Disable
  PowerShell command (1), or sc.exe stopping the WinDefend service (1).
author: PurpleForge Blue Agent
references:
  - https://attack.mitre.org/techniques/T1562/001/
logsource:
  product: windows
detection:
  defender_regkey:
    EventCode: 13
    TargetObject|contains:
      - \Windows Defender\DisableAntiSpyware
      - \Windows Defender\DisableRealtimeMonitoring
  condition: defender_regkey
falsepositives:
  - Administrators temporarily disabling AV for troubleshooting
level: high
tags:
  - attack.defense-evasion
  - attack.t1562.001
