<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="580" xmlns="http://www.w3.org/2000/svg" font-family="monospace, sans-serif">
  <!-- Background -->
  <rect width="900" height="580" fill="#0d1117"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#c9d1d9" font-size="22" font-weight="bold">PurpleForge — Adversarial Detection Engineering</text>
  <text x="450" y="58" text-anchor="middle" fill="#8b949e" font-size="13">Two AI agents fighting inside Splunk to improve MITRE ATT&amp;CK detection coverage</text>

  <!-- ── ORCHESTRATOR box ── -->
  <rect x="200" y="75" width="500" height="60" rx="8" fill="none" stroke="#6e7681" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="450" y="100" text-anchor="middle" fill="#8b949e" font-size="13">ORCHESTRATOR — round loop: inject → index → detect → score → adapt</text>
  <text x="450" y="118" text-anchor="middle" fill="#6e7681" font-size="11">orchestrator/main.py  ·  scorer.py  ·  checkpoint.py  ·  reporter.py</text>

  <!-- ── RED AGENT box ── -->
  <rect x="40" y="170" width="280" height="200" rx="10" fill="#1a0a0a" stroke="#e74c3c" stroke-width="2"/>
  <text x="180" y="195" text-anchor="middle" fill="#e74c3c" font-size="15" font-weight="bold">🔴 RED AGENT</text>
  <text x="180" y="216" text-anchor="middle" fill="#c9d1d9" font-size="12">MITRE ATT&amp;CK Templates</text>
  <text x="180" y="234" text-anchor="middle" fill="#8b949e" font-size="11">T1110.001 · T1021.001 · T1053.005</text>
  <text x="180" y="249" text-anchor="middle" fill="#8b949e" font-size="11">T1136.001 · T1003.001 · T1547.001</text>
  <line x1="60" y1="262" x2="300" y2="262" stroke="#2d2d2d" stroke-width="1"/>
  <text x="180" y="280" text-anchor="middle" fill="#c9d1d9" font-size="12">LLM Mutator</text>
  <text x="180" y="296" text-anchor="middle" fill="#8b949e" font-size="11">receives catching rule →</text>
  <text x="180" y="311" text-anchor="middle" fill="#8b949e" font-size="11">mutates attack to evade</text>
  <line x1="60" y1="325" x2="300" y2="325" stroke="#2d2d2d" stroke-width="1"/>
  <text x="180" y="345" text-anchor="middle" fill="#8b949e" font-size="11">red_agent/agent.py</text>
  <text x="180" y="360" text-anchor="middle" fill="#8b949e" font-size="11">injector.py  ·  mutator.py</text>

  <!-- ── BLUE AGENT box ── -->
  <rect x="580" y="170" width="280" height="200" rx="10" fill="#0a0a1a" stroke="#3498db" stroke-width="2"/>
  <text x="720" y="195" text-anchor="middle" fill="#3498db" font-size="15" font-weight="bold">🔵 BLUE AGENT</text>
  <text x="720" y="216" text-anchor="middle" fill="#c9d1d9" font-size="12">SPL Detection Rules</text>
  <text x="720" y="234" text-anchor="middle" fill="#8b949e" font-size="11">6 baseline rules + N generated</text>
  <text x="720" y="249" text-anchor="middle" fill="#8b949e" font-size="11">runs each round via MCP / REST</text>
  <line x1="600" y1="262" x2="840" y2="262" stroke="#2d2d2d" stroke-width="1"/>
  <text x="720" y="280" text-anchor="middle" fill="#c9d1d9" font-size="12">LLM Rule Generator</text>
  <text x="720" y="296" text-anchor="middle" fill="#8b949e" font-size="11">misses → new SPL rule</text>
  <text x="720" y="311" text-anchor="middle" fill="#8b949e" font-size="11">targeting evasion pattern</text>
  <line x1="600" y1="325" x2="840" y2="325" stroke="#2d2d2d" stroke-width="1"/>
  <text x="720" y="345" text-anchor="middle" fill="#8b949e" font-size="11">blue_agent/agent.py</text>
  <text x="720" y="360" text-anchor="middle" fill="#8b949e" font-size="11">detector.py  ·  generator.py</text>

  <!-- ── SPLUNK box ── -->
  <rect x="245" y="170" width="410" height="160" rx="10" fill="#0f1a0f" stroke="#27ae60" stroke-width="2"/>
  <text x="450" y="195" text-anchor="middle" fill="#27ae60" font-size="15" font-weight="bold">⚡ SPLUNK</text>
  <text x="450" y="215" text-anchor="middle" fill="#c9d1d9" font-size="12">arena_attacks index · arena_baseline index</text>
  <line x1="265" y1="225" x2="635" y2="225" stroke="#1a2d1a" stroke-width="1"/>
  <text x="330" y="248" text-anchor="middle" fill="#8b949e" font-size="11">HEC :8088</text>
  <text x="330" y="263" text-anchor="middle" fill="#6e7681" font-size="10">inject events</text>
  <text x="450" y="248" text-anchor="middle" fill="#8b949e" font-size="11">REST API :8089</text>
  <text x="450" y="263" text-anchor="middle" fill="#6e7681" font-size="10">search jobs</text>
  <text x="575" y="248" text-anchor="middle" fill="#8b949e" font-size="11">MCP Server</text>
  <text x="575" y="263" text-anchor="middle" fill="#6e7681" font-size="10">JSON-RPC 2.0</text>
  <line x1="265" y1="275" x2="635" y2="275" stroke="#1a2d1a" stroke-width="1"/>
  <text x="450" y="295" text-anchor="middle" fill="#8b949e" font-size="11">Simple XML Dashboard · Saved Searches</text>
  <text x="450" y="313" text-anchor="middle" fill="#6e7681" font-size="10">splunk_client/hec.py  ·  search.py  ·  mcp.py</text>

  <!-- ── LLM box ── -->
  <rect x="310" y="390" width="280" height="80" rx="8" fill="#1a1a0a" stroke="#f39c12" stroke-width="2"/>
  <text x="450" y="412" text-anchor="middle" fill="#f39c12" font-size="14" font-weight="bold">🤖 LLM</text>
  <text x="450" y="432" text-anchor="middle" fill="#c9d1d9" font-size="11">Foundation-sec-1.1  |  Ollama qwen2.5:3b  |  Gemini</text>
  <text x="450" y="450" text-anchor="middle" fill="#8b949e" font-size="10">llm_client/factory.py  ·  ollama_client.py  ·  splunk_hosted.py</text>

  <!-- ── OUTPUTS box ── -->
  <rect x="310" y="500" width="280" height="60" rx="8" fill="#0d1117" stroke="#8b949e" stroke-width="1.5"/>
  <text x="450" y="523" text-anchor="middle" fill="#c9d1d9" font-size="12">📊 Outputs</text>
  <text x="450" y="542" text-anchor="middle" fill="#8b949e" font-size="10">ATT&amp;CK Navigator Layer  ·  JSON Report  ·  Coverage Heatmap</text>

  <!-- ── Arrows ── -->
  <!-- Red → Splunk (HEC inject) -->
  <line x1="320" y1="270" x2="245" y2="230" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="255" y="258" fill="#e74c3c" font-size="10">inject</text>

  <!-- Splunk → Blue (search results) -->
  <line x1="655" y1="230" x2="580" y2="260" stroke="#3498db" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="618" y="252" fill="#3498db" font-size="10">results</text>

  <!-- Blue → Red (catching rule) -->
  <path d="M 580,320 Q 450,420 320,320" fill="none" stroke="#9b59b6" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowPurple)"/>
  <text x="430" y="395" fill="#9b59b6" font-size="10">catching rule</text>

  <!-- Red/Blue → LLM -->
  <line x1="180" y1="370" x2="310" y2="420" stroke="#f39c12" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrowGold)"/>
  <line x1="720" y1="370" x2="590" y2="420" stroke="#f39c12" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrowGold)"/>

  <!-- Outputs -->
  <line x1="450" y1="470" x2="450" y2="498" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e74c3c"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3498db"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9b59b6"/>
    </marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f39c12"/>
    </marker>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b949e"/>
    </marker>
  </defs>
</svg>
